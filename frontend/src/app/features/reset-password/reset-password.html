<section class="relative pt-32 pb-20 min-h-[870px] flex items-center justify-center">
  <div class="max-w-md w-full bg-surface-container-high/60 border border-outline-variant/20 rounded-2xl p-8 shadow-2xl shadow-purple-900/30 backdrop-blur-xl animate-in zoom-in-95 duration-500">
    
    <!-- Title & Subtitle -->
    <div class="flex flex-col items-center text-center mb-8">
      <div class="w-16 h-16 rounded-full bg-purple-600/20 flex items-center justify-center mb-4 border border-purple-500/40">
        <span class="material-symbols-outlined text-4xl text-purple-400">lock_reset</span>
      </div>
      <h1 class="text-3xl font-headline font-bold text-white mb-2">Nueva Contraseña</h1>
      <p class="text-on-surface-variant text-sm">Asegúrate de que esta vez nadie pueda descifrar tu chispa.</p>
    </div>

    <!-- Loading State -->
    <div *ngIf="isValidating" class="flex flex-col items-center py-10 gap-4">
      <span class="material-symbols-outlined animate-spin text-4xl text-purple-500">progress_activity</span>
      <p class="text-zinc-400 text-sm animate-pulse">Validando portal de recuperación...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="!isValidating && !isTokenValid" class="text-center py-6">
      <div class="bg-red-500/10 border border-red-500/20 rounded-xl p-6 mb-8">
        <span class="material-symbols-outlined text-red-400 text-4xl mb-3">error</span>
        <p class="text-red-200 text-sm font-semibold">{{ error }}</p>
      </div>
      <button [routerLink]="['/login']" 
              class="w-full py-3 rounded-lg bg-transparent border border-outline-variant/30 text-zinc-300 font-bold tracking-wider uppercase text-xs hover:bg-white/5 transition-all">
        Volver al Inicio
      </button>
    </div>

    <!-- Form State -->
    <form *ngIf="!isValidating && isTokenValid && !message" (submit)="onSubmit()" class="space-y-6">
      
      <div class="space-y-2 text-left">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">NUEVA CONTRASEÑA</label>
        <input
          type="password"
          [(ngModel)]="newPassword"
          name="newPassword"
          class="w-full h-11 rounded-md bg-surface-container/80 border border-outline-variant/40 px-4 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all"
          placeholder="••••••••"
          required
        />
      </div>

      <div class="space-y-2 text-left">
        <label class="block text-xs font-semibold tracking-wider uppercase text-zinc-400">CONFIRMAR CONTRASEÑA</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          class="w-full h-11 rounded-md bg-surface-container/80 border border-outline-variant/40 px-4 text-sm text-zinc-100 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all"
          placeholder="••••••••"
          required
        />
      </div>

      @if (error) {
        <p class="text-red-400 text-xs text-center animate-pulse">{{ error }}</p>
      }

      <button
        type="submit"
        [disabled]="isSubmitting"
        class="w-full py-3.5 rounded-lg bg-purple-600 text-white font-bold tracking-wider uppercase text-sm shadow-lg shadow-purple-900/40 hover:bg-purple-500 hover:-translate-y-0.5 transition-all disabled:opacity-50"
      >
        @if (!isSubmitting) { Actualizar Contraseña } @else { Actualizando... }
      </button>
    </form>

    <!-- Success State -->
    <div *ngIf="message" class="text-center py-8">
      <div class="bg-emerald-500/10 border border-emerald-500/20 rounded-xl p-6">
        <span class="material-symbols-outlined text-emerald-400 text-5xl mb-4">check_circle</span>
        <h3 class="text-white font-bold text-lg mb-2">¡Éxito!</h3>
        <p class="text-emerald-200/80 text-sm">{{ message }}</p>
      </div>
    </div>

  </div>
</section>
