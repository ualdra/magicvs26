<div class="mt-12">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h2 class="text-2xl font-bold text-white">Colección de Cartas</h2>
      <p class="text-sm text-zinc-400 mt-1">Cartas obtenidas de los sobres</p>
    </div>
    <div *ngIf="isOwnProfile" class="flex gap-3">
      <a routerLink="/cartas" [queryParams]="{ collectionOnly: true }" class="inline-flex items-center gap-2 rounded-xl border border-white/10 bg-white/5 px-5 py-2.5 text-sm font-bold text-zinc-100 transition-colors hover:bg-white/10 shadow-lg">
        <span class="material-symbols-outlined text-sm">collections</span>
        Ver todas las cartas
      </a>
      <a routerLink="/booster" class="inline-flex items-center gap-2 rounded-xl bg-gradient-to-r from-purple-600 to-indigo-600 px-5 py-2.5 text-sm font-bold text-white transition-all hover:from-purple-500 hover:to-indigo-500 shadow-lg hover:shadow-purple-500/25">
        <span class="material-symbols-outlined text-sm">redeem</span>
        Abrir Sobre
      </a>
    </div>
  </div>

  <div *ngIf="loading" class="animate-pulse flex gap-4 overflow-x-auto pb-4">
    <div *ngFor="let i of [1,2,3,4,5]" class="w-48 h-64 bg-zinc-800 rounded-xl flex-shrink-0"></div>
  </div>

  <div *ngIf="error" class="bg-red-900/50 border border-red-500 text-red-200 p-4 rounded-lg">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error && collection.length === 0" class="text-center py-12 bg-zinc-900/50 rounded-2xl border border-white/5">
    <span class="material-symbols-outlined text-4xl text-zinc-600 mb-2">style</span>
    <p class="text-zinc-400">Esta colección está vacía.</p>
  </div>

  <div *ngIf="!loading && !error && collection.length > 0" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-8 gap-4">
    <div *ngFor="let card of sortedAndLimitedCollection" class="relative group aspect-[2.5/3.5] bg-zinc-800 rounded-xl overflow-hidden shadow-lg transition-transform hover:scale-105">
      <img [src]="card.imageUrl" [alt]="card.name" class="w-full h-full object-cover">
      
      <!-- Quantity Badge -->
      <div class="absolute top-2 right-2 bg-black/80 text-white font-bold px-2 py-1 rounded-full text-xs border border-white/20 backdrop-blur-sm z-10">
        x{{ card.quantity }}
      </div>

      <!-- Details Overlay -->
      <div class="absolute inset-0 bg-black/70 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col justify-end p-3">
        <p class="font-bold text-sm text-white truncate">{{ card.name }}</p>
        <p class="text-xs text-gray-300 truncate">{{ card.typeLine }}</p>
        <p class="text-xs uppercase tracking-wider mt-1" [ngClass]="getRarityClass(card.rarity)">
          {{ translateRarity(card.rarity) }}
        </p>
      </div>
    </div>
  </div>
</div>
