<!-- TopNavBar -->
<nav class="fixed top-0 z-50 w-full bg-zinc-900/80 backdrop-blur-xl shadow-2xl shadow-purple-900/20">
  <div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-2xl mx-auto">

    <!-- LOGO -->
    <div class="flex items-center gap-2 text-2xl font-black text-purple-400 cursor-pointer" (click)="goHome()"
      role="button" aria-label="Ir a inicio">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">style</span>
      <span class="font-headline tracking-tighter">MagicVS</span>
    </div>

    <!-- NAV LINKS -->
    <div class="hidden md:flex items-center gap-8">
      <a class="text-zinc-400 hover:text-zinc-100 transition-colors tracking-wider uppercase Manrope text-sm pb-1 border-b-2"
        routerLink="/" [routerLinkActiveOptions]="{exact: true}"
        routerLinkActive="text-purple-400 border-purple-500 font-bold">
        Explorador
      </a>
      <a class="text-zinc-400 hover:text-zinc-100 transition-colors tracking-wider uppercase Manrope text-sm pb-1 border-b-2"
        routerLink="/noticias" routerLinkActive="text-purple-400 border-purple-500 font-bold">
        Noticias
      </a>

      <a class="text-zinc-400 hover:text-zinc-100 transition-colors tracking-wider uppercase Manrope text-sm pb-1 border-b-2"
        routerLink="/decks" routerLinkActive="text-purple-400 border-purple-500 font-bold">
        Mazos
      </a>

      <a class="text-zinc-400 hover:text-zinc-100 transition-colors tracking-wider uppercase Manrope text-sm pb-1 border-b-2"
        routerLink="/combat" routerLinkActive="text-purple-400 border-purple-500 font-bold">
        Combate
      </a>

      @if (isLoggedIn) {
      <a class="text-zinc-400 hover:text-zinc-100 transition-colors tracking-wider uppercase Manrope text-sm pb-1 border-b-2"
        routerLink="/profile/me" routerLinkActive="text-purple-400 border-purple-500 font-bold">
        Perfil
      </a>
      }
    </div>

    <!-- RIGHT SIDE -->
    <div class="flex items-center gap-4">

      @if (!isLoggedIn) {

      <!-- LOGIN / REGISTER -->
      <a class="hidden md:inline-flex items-center px-4 py-2 rounded-full border border-purple-500/60 bg-zinc-900/60 text-purple-400 font-bold tracking-wider uppercase Manrope text-sm hover:bg-purple-500/10 hover:text-purple-200 transition-colors"
        routerLink="/login" routerLinkActive="bg-purple-500/20 text-purple-100 border-purple-500">
        Login
      </a>

      <a class="hidden md:inline-flex items-center px-4 py-2 rounded-full bg-purple-600/80 text-white font-bold tracking-wider uppercase Manrope text-sm shadow-lg shadow-purple-900/40 hover:bg-purple-500 transition-colors"
        routerLink="/registro" routerLinkActive="bg-purple-500 shadow-purple-900/60">
        Registro
      </a>

      } @else {

      <!-- DESKTOP -->
      <div class="hidden md:flex items-center gap-4 logged-in">
        <button
          class="inline-flex items-center px-4 py-2 rounded-full bg-zinc-800/80 text-zinc-200 font-bold tracking-wider uppercase Manrope text-sm hover:bg-zinc-700 transition-colors"
          (click)="logout()">
          Cerrar sesión
        </button>

        <div class="user-block inline-flex items-baseline gap-0">
          <span class="display-name text-sm font-bold text-zinc-100 leading-4 truncate">
            {{ displayName }}
          </span>
          <span class="friend-tag text-xs text-zinc-500 opacity-80">
            #{{ friendTag }}
          </span>
        </div>

        <a class="p-2 rounded-full hover:bg-zinc-800/50 transition-all duration-300 text-zinc-400 hover:text-purple-400"
          routerLink="/profile/me">
          <span class="material-symbols-outlined text-2xl">account_circle</span>
        </a>
      </div>

      <!-- MOBILE -->
      <div class="md:hidden flex items-center gap-3 w-full">
        <button class="px-3 py-1 rounded bg-zinc-800 text-zinc-200" (click)="logout()">
          Salir
        </button>

        <div class="flex-1 text-center">
          <span class="text-sm font-bold text-zinc-100">
            {{ displayName }}
          </span>
          <span class="text-xs text-zinc-500">
            #{{ friendTag }}
          </span>
        </div>

        <a class="p-2 rounded-full hover:bg-zinc-800/50 transition-all duration-300 text-zinc-400 hover:text-purple-400"
          routerLink="/profile/me">
          <span class="material-symbols-outlined text-2xl">account_circle</span>
        </a>
      </div>

      }
    </div>
  </div>
</nav>

<main class="flex-grow">
  <router-outlet></router-outlet>
</main>

<!-- Footer -->
<footer class="bg-zinc-950 border-t border-zinc-800/30 py-8 mt-auto">
  <div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto opacity-60">
    <p class="font-light Manrope text-xs tracking-tight text-zinc-500 mb-4 md:mb-0">
      Proyecto universitario (DRA)
    </p>

    <div class="flex items-center gap-6">
      <a class="text-zinc-500 hover:text-zinc-200 transition-colors font-light Manrope text-xs tracking-tight flex items-center gap-2"
        href="https://github.com/ualdra/magicvs26.git" target="_blank">
        <span class="material-symbols-outlined text-sm">code</span>
        GitHub
      </a>
    </div>
  </div>
</footer>
